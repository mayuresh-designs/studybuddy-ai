<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyBuddy AI - Free AI Tutor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                    <span>StudyBuddy AI</span>
                </div>
                <button id="new-chat-btn" class="new-chat-btn">
                    <i class="fas fa-plus"></i> New Chat
                </button>
            </div>

            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="history-search" placeholder="Search chats...">
            </div>

            <div class="history-section">
                <div class="history-header">Today</div>
                <div id="chat-history" class="history-list"></div>
            </div>

            <div class="sidebar-footer">
                <button id="clear-all-btn">
                    <i class="fas fa-trash"></i> Clear All
                </button>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="main-chat">
            <!-- Top Bar (Updated with your name) -->
            <div class="top-bar">
                <div id="chat-title">New Chat</div>
                
                <div class="user-info">
                    <span class="owner-name">Mayuresh Kulkarni</span>
                    <i class="fas fa-user-circle"></i>
                </div>

                <div class="top-bar-right">
                    <button id="voice-btn" class="icon-btn" title="Voice Input">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <button id="pin-btn" class="icon-btn" title="Pin Chat">
                        <i class="fas fa-thumbtack"></i>
                    </button>
                </div>
            </div>

            <!-- Messages -->
            <div class="chat-container" id="chat-container">
                <div class="welcome">
                    <h1>👋 Hi Student!</h1>
                    <p>How can I help you with your studies today?</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="Ask anything... (e.g., Explain Newton's laws simply)"></textarea>
                    <button id="send-btn" class="send-btn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <p class="disclaimer">100% Free AI Tutor • Made with ❤️ by Mayuresh Kulkarni</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
